      - generic [ref=e302]:
        - text: About Us
        - heading "About Us" [level=2] [ref=e303]
        - paragraph [ref=e304]: Create memorable experiences that allow each traveler to discover the essence of Cusco, providing a warm, personalized and excellent service that makes each stay an unforgettable memory.
      - generic [ref=e305]:
        - generic [ref=e306]:
          - heading "Our Mission" [level=3] [ref=e310]
          - paragraph [ref=e311]: Provide a unique lodging experience in the heart of Cusco, offering a personalized, warm and high quality service that combines comfort, hospitality and the richness of local culture. We are committed to exceeding our guests' expectations through exceptional attention, a passionate human team and sustainable tourism practices that generate unforgettable memories.
        - generic [ref=e312]:
          - heading "Our Vision" [level=3] [ref=e317]
          - paragraph [ref=e318]: To be the benchmark hotel in Cusco, maintaining the essence of our culture. We aspire to be the first choice of travelers seeking excellence, warmth and personalized service, distinguishing ourselves by our hospitality, innovation and commitment to sustainability. We seek to create a positive impact on our guests, collaborators and community, promoting responsible tourism that values and preserves the cultural and natural heritage of Cusco.
      - heading "Our Values" [level=3] [ref=e320]
      - generic [ref=e321]:
        - generic [ref=e322]:
          - heading "Hospitality" [level=4] [ref=e326]
          - paragraph [ref=e327]: We receive each guest with warmth, kindness and a close treatment, making them feel at home from their arrival.
        - generic [ref=e328]:
          - heading "Excellence" [level=4] [ref=e332]
          - paragraph [ref=e333]: We seek continuous improvement to offer a high-quality service that exceeds our guests' expectations.
        - generic [ref=e334]:
          - heading "Authenticity" [level=4] [ref=e338]
          - paragraph [ref=e339]: We share the cultural richness of Cusco through genuine experiences that connect our visitors with local identity.
        - generic [ref=e340]:
