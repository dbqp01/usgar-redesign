          - paragraph [ref=e345]: We act with integrity and consideration towards our guests, collaborators, suppliers, the community and the environment.
        - generic [ref=e346]:
          - heading "Commitment" [level=4] [ref=e350]
          - paragraph [ref=e351]: We work with responsibility, dedication and passion to guarantee a memorable experience in each stay.
        - generic [ref=e352]:
          - heading "Sustainability" [level=4] [ref=e356]
          - paragraph [ref=e357]: We promote responsible tourism through practices that contribute to the conservation of the natural environment and cultural heritage.
